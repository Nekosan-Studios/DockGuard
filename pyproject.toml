[project]
name = "docker-security-watch"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "apscheduler",
    "uvicorn",
    "docker",
    "sqlmodel",
    "alembic",
]

[dependency-groups]
dev = ["pytest", "httpx"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "e2e: end-to-end tests requiring a live Docker daemon and grype on PATH",
]
