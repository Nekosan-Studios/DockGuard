name: CI / Docker Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run tests before building?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      push_image:
        description: 'Push image to GHCR?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless signing (OIDC)
  attestations: write   # SLSA provenance and SBOM attestations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Run tests (PRs and optional manual dispatch) ─────────────
  test:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_tests == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend tests ──────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install grype (for e2e tests)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.109.1

      - name: Run pytest (including e2e)
        run: uv run pytest -m ""

      # ── Frontend checks ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Svelte check
        run: npm run check
        working-directory: frontend

      - name: Run Vitest unit tests
        run: npm run test:unit -- run
        working-directory: frontend

  # ── Job 2: Build & push Docker image ────────────────────────────────
  docker-build-push:
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to dhi.io
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Strip the leading "v" from the tag (v0.2.0 → 0.2.0)
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ github.ref_name }}"
            # Sanitize branch name for use as a Docker tag (slashes → dashes, etc.)
            TAG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          else
            TAG="latest"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dockguard
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true   # SLSA Level 2 build provenance attestation
          sbom: true         # SPDX SBOM via BuildKit/Syft

      - name: Attest VEX document
        if: steps.build.outputs.digest != ''
        env:
          COSIGN_YES: "true"
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/dockguard@${{ steps.build.outputs.digest }}"
          cosign attest --predicate vex/dockguard.vex.json \
            --type openvex \
            "$IMAGE"
