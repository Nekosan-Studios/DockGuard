# Grype configuration for DockGuard self-scanning.
#
# These ignore rules suppress known-unfixable vulnerabilities in our
# production Docker image. Each entry documents why the CVE cannot
# currently be remediated. See VULNERABILITY_REPORT.md for the full
# analysis.
#
# Usage:
#   grype docker-dockguard -o table
#
# To see ALL vulnerabilities including suppressed ones:
#   grype docker-dockguard -o table --show-suppressed

ignore:

  # ── Grype binary (Go/Rust dependencies) ────────────────────────────────
  # These are compiled into the Grype binary. Fix requires a new Grype release.

  - vulnerability: GHSA-9h8m-3fm2-qjrq   # go.opentelemetry.io/otel/sdk — High
  - vulnerability: GHSA-h395-gr6q-cpjc    # jsonwebtoken (rust-crate) — Medium
  - vulnerability: GHSA-q9hv-hpm4-hj6x   # github.com/cloudflare/circl — Low

  # ── Python 3.13 (Debian-packaged) ──────────────────────────────────────
  # Debian's python3.13 packages. No fix available from Debian yet.
  # Some CVEs only fixed in unreleased Python 3.15.

  - vulnerability: CVE-2025-6069
  - vulnerability: CVE-2025-6075
  - vulnerability: CVE-2025-8194
  - vulnerability: CVE-2025-8291
  - vulnerability: CVE-2025-12084
  - vulnerability: CVE-2025-12781
  - vulnerability: CVE-2025-13836
  - vulnerability: CVE-2025-13837
  - vulnerability: CVE-2025-15282
  - vulnerability: CVE-2025-15366
  - vulnerability: CVE-2025-15367
  - vulnerability: CVE-2025-11468
  - vulnerability: CVE-2026-0672
  - vulnerability: CVE-2026-0865
  - vulnerability: CVE-2026-1299
  - vulnerability: CVE-2026-2297

  # ── Node.js / libnode115 (Debian-packaged) ─────────────────────────────
  # Debian's nodejs v20 and transitive deps. No fix available from Debian yet.

  - vulnerability: CVE-2025-55130   # Critical — nodejs
  - vulnerability: CVE-2025-55131   # High — nodejs
  - vulnerability: CVE-2025-55132   # Medium — nodejs
  - vulnerability: CVE-2025-59465   # High — nodejs
  - vulnerability: CVE-2025-59466   # High — nodejs
  - vulnerability: CVE-2026-21637   # High — nodejs
  - vulnerability: CVE-2026-25547   # Critical — node-brace-expansion
  - vulnerability: CVE-2026-26996   # High — node-minimatch
  - vulnerability: CVE-2026-27903   # High — node-minimatch
