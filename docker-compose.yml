services:
  docker-security-watch:
    build: .
    ports:
      - "8765:8765"
    volumes:
      # Persist the SQLite database across container restarts
      - dsw-data:/app/data
      # Mount the host Docker socket so the app can introspect running containers.
      # Required — without this the scheduler cannot detect which images are running.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite:////app/data/docker_security_watch.db
      - SCAN_INTERVAL_SECONDS=60
      - MAX_CONCURRENT_SCANS=1

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Internal Docker network name of the backend service
      - API_URL=http://docker-security-watch:8765
    depends_on:
      - docker-security-watch

volumes:
  dsw-data:
