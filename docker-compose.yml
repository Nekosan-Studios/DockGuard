# ─────────────────────────────────────────────────────────────────────────────
# DockGuard
#
# Quick start:
#   docker compose up -d
#
# Dashboard: http://localhost:8764
# API:       http://localhost:8765
#
# This compose file uses docker-socket-proxy (recommended) to limit DockGuard's
# Docker API access to only what it needs (read-only container and image info).
# See: https://github.com/Tecnativa/docker-socket-proxy
# ─────────────────────────────────────────────────────────────────────────────

services:
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only access to host socket
    environment:
      CONTAINERS: 1   # Allow listing/inspecting containers (read-only)
      IMAGES: 1       # Allow listing images (read-only)
      # Everything else defaults to 0 (denied)
    restart: unless-stopped

  dockguard:
    image: ghcr.io/nekosan-studios/dockguard:latest
    ports:
      - "8764:8764"   # Web dashboard
      - "8765:8765"   # Backend API
    volumes:
      - ./data:/app/data   # Where to store SQLite database
    environment:
      TZ: UTC                                    # Put your timezone here
      DOCKER_HOST: tcp://socket-proxy:2375       # Connect via proxy instead of direct socket
      ORIGIN: http://your-server-ip:8764
    # These are all optional, app uses these defaults if not specified
    # and can be changed in the settings section of the app. Settings here override the settings section:
      # SCAN_INTERVAL_SECONDS=60         # How often to poll Docker for new/updated containers
      # MAX_CONCURRENT_SCANS=1           # Max Grype scans to run in parallel
      # DB_CHECK_INTERVAL_SECONDS=3600   # How often to check for Grype vulnerability DB updates
      # BASE_URL=http://your-server-ip:8764  # Public URL for deep links in notifications
      # API_URL=http://localhost:8765     # URL the frontend uses to reach the backend (internal)
    depends_on:
      - socket-proxy
    restart: unless-stopped
