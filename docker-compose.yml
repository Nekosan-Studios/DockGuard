# ─────────────────────────────────────────────────────────────────────────────
# DockGuard
#
# Quick start:
#   docker compose up -d
#
# Dashboard: http://localhost:8764
# API:       http://localhost:8765
# ─────────────────────────────────────────────────────────────────────────────

services:
  dockguard:
    image: ghcr.io/nekosan-studios/dockguard:latest
    ports:
      - "8764:8764"   # Web dashboard
      - "8765:8765"   # Backend API
    volumes:
      - ./data:/app/data                             # Where to store SQLite database
      - /var/run/docker.sock:/var/run/docker.sock    # Access host Docker daemon
    environment:
      TZ=UTC
      ORIGIN=http://your-server-ip:8764                                       # Put your timezone here
    # These are all optional, app uses these defaults if not specified 
    # and can be changed in the settings section of the app. Setting here override settings section:
      # SCAN_INTERVAL_SECONDS=60         # How often to poll Docker for new/updated containers
      # MAX_CONCURRENT_SCANS=1           # Max Grype scans to run in parallel
      # DB_CHECK_INTERVAL_SECONDS=3600   # How often to check for Grype vulnerability DB updates
      # BASE_URL=http://your-server-ip:8764  # Public URL for deep links in notifications
      # API_URL=http://localhost:8765     # URL the frontend uses to reach the backend (internal)
    restart: unless-stopped
